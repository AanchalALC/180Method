<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- <link rel="icon" type="image/png" href="/favicon.png" /> -->
    <!-- Default/Light Mode Favicon (with cache-busting ?v=2) -->
    <link rel="icon" type="image/png" href="/favicon-ink.png?v=2" />
    <link rel="icon" type="image/png" href="/favicon-ink.png?v=2" media="(prefers-color-scheme: light)" />

    <!-- Dark Mode Favicon (with cache-busting ?v=2) -->
    <link rel="icon" type="image/png" href="/favicon-lime.png?v=2" media="(prefers-color-scheme: dark)" />

    <meta name="theme-color" content="#0B0D0B" />

    <!-- Fallback webfonts. Delete this block once real Radio Stars + Gabriel Sans
         files are dropped into /public/fonts (see public/fonts/README.md). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Orbitron:wght@500;700;900&display=swap"
      rel="stylesheet"
    />

    <title>180 Method — Fitness, Nutrition & Counselling Studio in Bandra, Mumbai</title>
    <meta
      name="description"
      content="180 Method unites fitness, nutrition and psychology in one system. Personal, buddy and group training with counselling built in. Bandra, Mumbai."
    />
    <link rel="canonical" href="https://180method.in/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="180 Method" />
    <meta property="og:title" content="180 Method — Design who you can be." />
    <meta
      property="og:description"
      content="Strong in body, nourished in mind and grounded in well-being. Fitness, nutrition and counselling in Bandra, Mumbai."
    />
    <meta property="og:image" content="https://180method.in/images/og-default.jpg" />
    <meta property="og:url" content="https://180method.in/" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- LocalBusiness schema. TODO: replace streetAddress / postalCode / geo
         with the real studio values before go-live. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "HealthAndBeautyBusiness",
        "additionalType": "https://schema.org/ExerciseGym",
        "name": "180 Method",
        "description": "Fitness, nutrition and counselling studio uniting physical training with psychology.",
        "url": "https://180method.in/",
        "telephone": "+919702131149",
        "email": "team.180method@gmail.com",
        "image": "https://180method.in/images/og-default.jpg",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "TODO_STREET_ADDRESS",
          "addressLocality": "Bandra",
          "addressRegion": "Maharashtra",
          "postalCode": "TODO_PINCODE",
          "addressCountry": "IN"
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
            "opens": "08:00",
            "closes": "17:00"
          }
        ],
        "sameAs": ["https://www.instagram.com/180.method"]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
